[package]
name = "agriround-cycle"
version = "0.1.0"
edition = "2021"
description = "web app that automates cooperative savings by enabling farmers to contribute funds and receive scheduled payouts through fast, transparent blockchain transactions."
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
soroban-sdk = "25.3.0"

[dev-dependencies]
soroban-sdk = { version = "25.3.0", features = ["testutils"] }
[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true